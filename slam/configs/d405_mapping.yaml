%YAML:1.0
# D405 STEREO (non-inertial) SLAM config. D405 has NO IMU and is a close-range
# camera (~7-50cm) with an 18mm stereo baseline -> use pure stereo mode (--stereo).
# Values from factory calibration (calibration/factory_calib_409122272923.json).

File.version: "1.0"
Camera.type: "Rectified"

# MAPPING: save map
System.SaveAtlasToFile: "map_d405"

Camera1.fx: 388.0991
Camera1.fy: 388.0991
Camera1.cx: 322.4808
Camera1.cy: 242.9420

Stereo.b: 0.0181880          # 18.2 mm (short -> short reliable depth range)
Camera.width: 640
Camera.height: 480
Camera.fps: 30
Camera.RGB: 1
Stereo.ThDepth: 40.0

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 1250
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500.0
